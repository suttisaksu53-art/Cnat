        const Upload = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;

        const TableProperties = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M15 3v18"/><rect width="18" height="18" x="3" y="3" rx="2"/><path d="M21 9H3"/><path d="M21 15H3"/></svg>;
        const BookOpen = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>;
        const Target = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>;
        const BarChart2 = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>;
        const ListIcon = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>;
        const LayersIcon = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg>;
        const BoxIcon = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="21" x2="12" y2="16"/><line x1="12" y1="8" x2="12" y2="3"/><rect x="7" y="8" width="10" height="8" rx="1"/><line x1="7" y1="12" x2="17" y2="12"/></svg>;
        const AlertOctagon = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="7.86 2 16.14 2 22 7.86 22 16.14 16.14 22 7.86 22 2 16.14 2 7.86 7.86 2"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
        const RefreshCw = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>;
        const LockIcon = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const UnlockIcon = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>;
        const ClipboardList = ({size=24, className=""}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="M12 11h4"/><path d="M12 16h4"/><path d="M8 11h.01"/><path d="M8 16h.01"/></svg>;

        // ---------------- ฟังก์ชันสถิติ ----------------
        // เรียงลำดับตัวเลือกใหม่ทั้งหมดที่ใช้ในหน้า UI ประเมินดิน (เอา >80 และ 60-80 ออก)
        const availableRanges = ['0', '<5', '5-20', '20-40', '40-60', '>60'];
        const rankMap = { '0': 0, '<5': 1, '5-20': 2, '20-40': 3, '40-60': 4, '>60': 5, '60-80': 5, '>80': 6 };

        const getLddScore = (val, param) => {
            if (param === 'OM') return val < 1.5 ? 1 : val <= 3.5 ? 2 : 3;
            if (param === 'P') return val < 10 ? 1 : val <= 25 ? 2 : 3;
            if (param === 'K') return val < 60 ? 1 : val <= 90 ? 2 : 3;
            if (param === 'CEC') return val < 10 ? 1 : val <= 20 ? 2 : 3;
            if (param === 'BS') return val < 35 ? 1 : val <= 75 ? 2 : 3;
            return 1;
        };

        const calcCorrelation = (x, y) => {
            let n = x.length;
            if (n === 0) return 0;
            let sumX = 0, sumY = 0, sumXY = 0, sumX2 = 0, sumY2 = 0;
            for (let i = 0; i < n; i++) {
                sumX += x[i]; sumY += y[i]; sumXY += x[i] * y[i];
                sumX2 += x[i] * x[i]; sumY2 += y[i] * y[i];
            }
            let num = (n * sumXY) - (sumX * sumY);
            let den = Math.sqrt((n * sumX2 - sumX * sumX) * (n * sumY2 - sumY * sumY));
            return den === 0 ? 0 : num / den;
        };

        const calculateStats = (r, n) => {
            if (n <= 2) return { t: 0, p: 1 };
            if (Math.abs(r) >= 1) return { t: Infinity, p: 0 };
            
            const t = r * Math.sqrt((n - 2) / (1 - r * r));
            
            const absT = Math.abs(t);
            const poly = 1 / (1 + 0.2316419 * absT);
            const d = 0.3989423 * Math.exp(-absT * absT / 2);
            const prob = d * poly * (0.3193815 + poly * (-0.3565638 + poly * (1.781478 + poly * (-1.821256 + poly * 1.330274))));
            const p = 2 * prob; 

            return { t: t, p: p };
        };

        // ---------------- คอมโพเนนต์ Box Plot ----------------
        const StatBoxPlot = ({ title, data, hex, stroke, unit }) => {
            const [showOutliersList, setShowOutliersList] = useState(false);
            if (!data || data.length === 0) return null;

            const values = data.map(d => d.value);
            const sortedData = [...data].sort((a, b) => a.value - b.value);
            const sortedValues = sortedData.map(d => d.value);
            
            const n = values.length;
            const mean = values.reduce((a, b) => a + b, 0) / n;
            const variance = values.reduce((a, b) => a + Math.pow(b - mean, 2), 0) / (n - 1 || 1);
            const sd = Math.sqrt(variance);

            const quantile = (arr, q) => {
                const pos = (arr.length - 1) * q;
                const base = Math.floor(pos);
                const rest = pos - base;
                if (arr[base + 1] !== undefined) return arr[base] + rest * (arr[base + 1] - arr[base]);
                return arr[base];
            };

            const q1 = quantile(sortedValues, 0.25);
            const median = quantile(sortedValues, 0.5);
            const q3 = quantile(sortedValues, 0.75);
            const iqr = q3 - q1;
            
            const lowerFence = q1 - 1.5 * iqr;
            const upperFence = q3 + 1.5 * iqr;

            const outliers = sortedData.filter(d => d.value < lowerFence || d.value > upperFence);
            const regularVals = sortedValues.filter(v => v >= lowerFence && v <= upperFence);
            
            const min = regularVals.length ? Math.min(...regularVals) : q1;
            const max = regularVals.length ? Math.max(...regularVals) : q3;
            const globalMin = Math.min(...sortedValues);
            const globalMax = Math.max(...sortedValues);
            
            const w = 280, h = 380;
            const padT = 30, padB = 40, padL = 50, padR = 80;
            
            const yRange = (globalMax - globalMin) === 0 ? 1 : (globalMax - globalMin);
            const scaleYMin = Math.max(0, globalMin - (yRange * 0.1));
            const scaleYMax = globalMax + (yRange * 0.1);
            const scaleYRange = scaleYMax - scaleYMin;

            const scaleY = (val) => h - padB - ((val - scaleYMin) / scaleYRange) * (h - padT - padB);

            const centerX = padL + (w - padL - padR) / 2;
            const boxWidth = 60;

            const yTicks = [
                scaleYMin, 
                scaleYMin + scaleYRange * 0.25, 
                scaleYMin + scaleYRange * 0.5, 
                scaleYMin + scaleYRange * 0.75, 
                scaleYMax
            ];

            return (
                <div className={`flex flex-col bg-white p-5 border-2 rounded-xl shadow-sm w-full transition hover:shadow-md`} style={{ borderColor: stroke }}>
                    <div className="text-center mb-3">
                        <h4 className="font-bold text-lg text-gray-800" style={{ color: stroke }}>{title}</h4>
                        <p className="text-xs text-gray-500 font-mono">{unit}</p>
                    </div>

                    <div className="relative w-full flex justify-center">
                        <svg viewBox={`0 0 ${w} ${h}`} className="bg-gray-50/50 border border-gray-200 rounded-lg w-full max-w-[280px] h-auto">
                            {yTicks.map((val, i) => (
                                <g key={i}>
                                    <line x1={padL-5} y1={scaleY(val)} x2={w-padR+30} y2={scaleY(val)} stroke="#e2e8f0" strokeWidth="1" strokeDasharray="3"/>
                                    <text x={padL-10} y={scaleY(val)+4} textAnchor="end" fontSize="11" fill="#94a3b8" fontFamily="sans-serif">
                                        {val.toFixed(1)}
                                    </text>
                                </g>
                            ))}
                            
                            <line x1={padL} y1={padT} x2={padL} y2={h-padB} stroke="#cbd5e1" strokeWidth="2"/>

                            <line x1={centerX} y1={scaleY(max)} x2={centerX} y2={scaleY(q3)} stroke={stroke} strokeWidth="2.5" strokeDasharray="4"/>
                            <line x1={centerX} y1={scaleY(min)} x2={centerX} y2={scaleY(q1)} stroke={stroke} strokeWidth="2.5" strokeDasharray="4"/>
                            
                            <line x1={centerX - boxWidth/4} y1={scaleY(max)} x2={centerX + boxWidth/4} y2={scaleY(max)} stroke={stroke} strokeWidth="3"/>
                            <line x1={centerX - boxWidth/4} y1={scaleY(min)} x2={centerX + boxWidth/4} y2={scaleY(min)} stroke={stroke} strokeWidth="3"/>

                            <rect 
                                x={centerX - boxWidth/2} 
                                y={scaleY(q3)} 
                                width={boxWidth} 
                                height={Math.max(1, scaleY(q1) - scaleY(q3))} 
                                fill={hex} 
                                stroke={stroke} 
                                strokeWidth="2.5" 
                            />
                            
                            <line x1={centerX - boxWidth/2} y1={scaleY(median)} x2={centerX + boxWidth/2} y2={scaleY(median)} stroke="#1e293b" strokeWidth="3.5"/>

                            <text x={centerX + boxWidth/2 + 8} y={scaleY(q3) + 4} fontSize="11" fill="#475569" fontWeight="bold">Q3: {q3.toFixed(2)}</text>
                            <text x={centerX + boxWidth/2 + 8} y={scaleY(median) + 4} fontSize="11" fill="#0f172a" fontWeight="bold">Med: {median.toFixed(2)}</text>
                            <text x={centerX + boxWidth/2 + 8} y={scaleY(q1) + 4} fontSize="11" fill="#475569" fontWeight="bold">Q1: {q1.toFixed(2)}</text>
                            
                            <text x={centerX + boxWidth/4 + 6} y={scaleY(max) + 4} fontSize="10" fill="#64748b">Max</text>
                            <text x={centerX + boxWidth/4 + 6} y={scaleY(min) + 4} fontSize="10" fill="#64748b">Min</text>

                            {outliers.map((pt, i) => {
                                const jitter = (i % 3 - 1) * 6;
                                return (
                                    <g key={`out-${i}`}>
                                        <circle cx={centerX + jitter} cy={scaleY(pt.value)} r="4.5" fill="#ef4444" stroke="#ffffff" strokeWidth="1.5" className="cursor-help">
                                            <title>ลำดับที่ {pt.id}: {pt.value}</title>
                                        </circle>
                                    </g>
                                );
                            })}
                        </svg>
                    </div>

                    <div className="mt-5 w-full">
                        <div className="text-xs text-gray-700 bg-gray-50 border border-gray-200 rounded-lg overflow-hidden">
                            <div className="grid grid-cols-2 divide-x divide-gray-200 border-b border-gray-200">
                                <div className="p-2 flex justify-between bg-white"><span className="text-gray-500">N:</span> <strong>{n}</strong></div>
                                <div className="p-2 flex justify-between bg-white"><span className="text-gray-500">Mean:</span> <strong>{mean.toFixed(2)}</strong></div>
                            </div>
                            <div className="grid grid-cols-2 divide-x divide-gray-200 border-b border-gray-200">
                                <div className="p-2 flex justify-between bg-white"><span className="text-gray-500">S.D.:</span> <strong>{sd.toFixed(2)}</strong></div>
                                <div className="p-2 flex justify-between bg-white"><span className="text-gray-500">IQR:</span> <strong>{iqr.toFixed(2)}</strong></div>
                            </div>
                            <div className="grid grid-cols-2 divide-x divide-gray-200 border-b border-gray-200">
                                <div className="p-2 flex justify-between bg-white"><span className="text-gray-500">Up. Fence:</span> <span>{upperFence.toFixed(2)}</span></div>
                                <div className="p-2 flex justify-between bg-white"><span className="text-gray-500">Low. Fence:</span> <span>{lowerFence.toFixed(2)}</span></div>
                            </div>
                        </div>

                        <div className="mt-3">
                            <button 
                                onClick={() => setShowOutliersList(!showOutliersList)}
                                disabled={outliers.length === 0}
                                className={`w-full py-2 px-3 rounded-lg flex items-center justify-between text-sm font-bold transition-all ${outliers.length > 0 ? (showOutliersList ? 'bg-red-600 text-white' : 'bg-red-50 text-red-600 border border-red-200 hover:bg-red-100') : 'bg-gray-100 text-gray-400 cursor-not-allowed border border-gray-200'}`}
                            >
                                <div className="flex items-center">
                                    <AlertOctagon size={16} className="mr-2" /> 
                                    {outliers.length > 0 ? `พบค่า Outlier ${outliers.length} จุด` : 'ไม่พบค่า Outlier'}
                                </div>
                                {outliers.length > 0 && <span>{showOutliersList ? 'ซ่อน' : 'เปิดดู'}</span>}
                            </button>

                            {showOutliersList && outliers.length > 0 && (
                                <div className="mt-2 bg-red-50 border border-red-200 rounded-lg p-3 text-xs animate-fade-in max-h-32 overflow-y-auto hide-scrollbar">
                                    <p className="text-red-800 font-bold mb-2 border-b border-red-200 pb-1">รายการข้อมูลที่ผิดปกติ (ค่า ±1.5 IQR)</p>
                                    <ul className="space-y-1 text-red-700 font-mono">
                                        {outliers.map((pt, i) => (
                                            <li key={i} className="flex justify-between bg-white p-1.5 rounded border border-red-100">
                                                <span>แถว Excel ที่ {pt.id}</span>
                                                <span className="font-bold">{pt.value} {unit}</span>
                                            </li>
                                        ))}
                                    </ul>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // ---------------- คอมโพเนนต์พล็อตจุด (Scatter Plot) ----------------
        const ScatterPlot = ({ title, yLabel, data, stat, isFertilityScore }) => {
            if (!data || data.length === 0) return null;
            
            const w = 450, h = 350;
            const padT = 30, padR = 20, padB = 55, padL = 70;
            const minX = -0.5, maxX = 6.5;
            const used = stat.used;
            const isNegative = stat.r < 0; 
            
            const yValues = data.map(d => d.y);
            const rawMinY = Math.min(...yValues);
            const rawMaxY = Math.max(...yValues);
            const yRange = (rawMaxY - rawMinY) === 0 ? 1 : (rawMaxY - rawMinY);
            
            const minY = isFertilityScore ? 0.5 : Math.max(0, rawMinY - (yRange * 0.1)); 
            const maxY = isFertilityScore ? 3.5 : rawMaxY + (yRange * 0.1);
            const adjYRange = maxY - minY;

            const scaleX = (x) => padL + ((x - minX) / (maxX - minX)) * (w - padL - padR);
            const scaleY = (y) => h - padB - ((y - minY) / adjYRange) * (h - padT - padB);

            const n = data.length;
            const sumX = data.reduce((a,b)=>a+b.x, 0);
            const sumY = data.reduce((a,b)=>a+b.y, 0);
            const sumXY = data.reduce((a,b)=>a+b.x*b.y, 0);
            const sumX2 = data.reduce((a,b)=>a+b.x*b.x, 0);
            const m = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
            const b = (sumY - m * sumX) / n;
            const y1 = m * 0 + b;
            const y2 = m * 6 + b;

            const xTicks = [0, 1, 2, 3, 4, 5, 6];
            
            const yTicks = isFertilityScore ? [1, 2, 3] : [
                minY, 
                minY + adjYRange * 0.25, 
                minY + adjYRange * 0.5, 
                minY + adjYRange * 0.75, 
                maxY
            ];

            const getYTickLabel = (val) => {
                if (isFertilityScore) {
                    if (val === 1) return 'ต่ำ (1)';
                    if (val === 2) return 'ปานกลาง (2)';
                    if (val === 3) return 'สูง (3)';
                    return '';
                }
                return val.toFixed(1);
            };

            const dotColor = used ? (isNegative ? '#f59e0b' : '#3b82f6') : '#94a3b8';
            const borderColor = used ? (isNegative ? 'border-orange-300 shadow-orange-100' : 'border-blue-300 shadow-blue-100') : 'border-gray-200 opacity-80';

            return (
                <div className={`flex flex-col items-center bg-white p-4 border rounded-xl shadow-sm ${borderColor}`}>
                    <h4 className="font-bold text-sm text-gray-800 mb-3 text-center">{title}</h4>
                    <svg viewBox={`0 0 ${w} ${h}`} className="bg-white w-full h-auto max-w-full">
                        
                        {yTicks.map((val, i) => (
                            <g key={`gy-${i}`}>
                                <line x1={padL} y1={scaleY(val)} x2={w-padR} y2={scaleY(val)} stroke="#f1f5f9" strokeWidth="1"/>
                                <text x={padL-10} y={scaleY(val)+4} textAnchor="end" fontSize="12" fill="#64748b" fontFamily="sans-serif">
                                    {getYTickLabel(val)}
                                </text>
                            </g>
                        ))}
                        
                        {xTicks.map((val, i) => (
                            <g key={`gx-${i}`}>
                                <line x1={scaleX(val)} y1={padT} x2={scaleX(val)} y2={h-padB} stroke="#f1f5f9" strokeWidth="1"/>
                                <text x={scaleX(val)} y={h-padB+20} textAnchor="middle" fontSize="12" fill="#64748b" fontFamily="sans-serif">
                                    {val}
                                </text>
                            </g>
                        ))}

                        <line x1={padL} y1={h-padB} x2={w-padR} y2={h-padB} stroke="#475569" strokeWidth="2"/>
                        <line x1={padL} y1={padT} x2={padL} y2={h-padB} stroke="#475569" strokeWidth="2"/>

                        <text x={padL + (w-padL-padR)/2} y={h-10} textAnchor="middle" fontSize="14" fontWeight="bold" fill="#334155" fontFamily="sans-serif">
                            อันดับปริมาณแร่ (Rank 0-6)
                        </text>
                        <text x={-(padT + (h-padT-padB)/2)} y={20} transform="rotate(-90)" textAnchor="middle" fontSize="14" fontWeight="bold" fill="#334155" fontFamily="sans-serif">
                            {yLabel}
                        </text>

                        {data.map((d, i) => {
                            const jitter = (i % 7 - 3) * 0.08; 
                            return <circle key={i} cx={scaleX(d.x + jitter)} cy={scaleY(d.y)} r="4" fill={dotColor} opacity="0.6"/>
                        })}
                        
                        <line x1={scaleX(0)} y1={scaleY(y1)} x2={scaleX(6)} y2={scaleY(y2)} stroke={used ? '#ef4444' : '#64748b'} strokeWidth="2.5" strokeDasharray="5,5"/>

                        <g transform={`translate(${padL + 15}, ${padT + 10})`}>
                            <rect x="0" y="0" width="130" height="65" fill="white" stroke="#cbd5e1" strokeWidth="1" rx="4" opacity="0.9"/>
                            <text x="10" y="20" fontSize="12" fill="#1e293b" fontFamily="sans-serif" fontWeight="bold">r = {stat.r.toFixed(4)}</text>
                            <text x="10" y="38" fontSize="12" fill={stat.p <= 0.05 ? "#166534" : "#ef4444"} fontFamily="sans-serif" fontWeight="bold">
                                p {stat.p < 0.001 ? '< 0.001' : '= ' + stat.p.toFixed(4)}
                            </text>
                            <text x="10" y="56" fontSize="12" fill="#1e293b" fontFamily="sans-serif">y = {m.toFixed(2)}x + {b.toFixed(2)}</text>
                        </g>
                    </svg>
                </div>
            );
        };

        // ---------------- คอมโพเนนต์หลักของโปรแกรม ----------------
        function App() {
            const [modelMode, setModelMode] = useState('bottom_up'); // 'bottom_up' หรือ 'top_down'
            const [useStrictP, setUseStrictP] = useState(true); // เพิ่ม State สำหรับควบคุมการใช้ p-value <= 0.05
            const [modelTrained, setModelTrained] = useState(false);
            
            const [showStats, setShowStats] = useState(false); 
            const [showRawData, setShowRawData] = useState(false);
            const [showGroupedData, setShowGroupedData] = useState(false);
            const [showBoxPlots, setShowBoxPlots] = useState(false);
            
            const [rawTrainingData, setRawTrainingData] = useState([]);
            const [groupedData, setGroupedData] = useState({});
            
            const [weights, setWeights] = useState({});
            const [stats, setStats] = useState({});
            const [cutoffs, setCutoffs] = useState({});
            const [chartData, setChartData] = useState({});
            const [errorMsg, setErrorMsg] = useState('');
            
            const [inputXrd, setInputXrd] = useState({ Kaolinite: '0', Illite: '0', Smectite: '0', Vermiculite: '0' });
            const [prediction, setPrediction] = useState(null);

            const resetApp = () => {
                setModelTrained(false);
                setPrediction(null);
                setShowStats(false);
                setShowRawData(false);
                setShowGroupedData(false);
                setShowBoxPlots(false);
                setErrorMsg('');
            };

            const processCSV = (text, mode = modelMode, strictP = useStrictP) => {
                try {
                    const lines = text.split('\n').filter(line => line.trim() !== '');
                    const headers = lines[0].split(',').map(h => h.trim().toLowerCase());
                    
                    const colIdx = {
                        kaolinite: headers.findIndex(h => h.includes('kaolinite')),
                        illite: headers.findIndex(h => h.includes('illite')),
                        smectite: headers.findIndex(h => h.includes('smectite')),
                        vermiculite: headers.findIndex(h => h.includes('vermiculite')),
                        cec: headers.findIndex(h => h === 'cec'),
                        bs: headers.findIndex(h => h.includes('bs')),
                        om: headers.findIndex(h => h === 'om'),
                        p: headers.findIndex(h => h === 'p-bray ii' || h === 'p'),
                        k: headers.findIndex(h => h === 'avail. k' || h === 'k')
                    };

                    if (Object.values(colIdx).some(v => v === -1)) throw new Error('รูปแบบคอลัมน์ไม่ถูกต้อง กรุณาตรวจสอบหัวคอลัมน์ในไฟล์');

                    const data = [];
                    for (let i = 1; i < lines.length; i++) {
                        const row = lines[i].split(',').map(c => c.trim());
                        if (row.length < headers.length) continue;
                        
                        const sCEC = getLddScore(parseFloat(row[colIdx.cec]), 'CEC');
                        const sBS = getLddScore(parseFloat(row[colIdx.bs]), 'BS');
                        const sOM = getLddScore(parseFloat(row[colIdx.om]), 'OM');
                        const sP = getLddScore(parseFloat(row[colIdx.p]), 'P');
                        const sK = getLddScore(parseFloat(row[colIdx.k]), 'K');
                        const totalS = sCEC + sBS + sOM + sP + sK;
                        
                        let fClass = 2; 
                        if (totalS <= 7) fClass = 1; 
                        if (totalS >= 13) fClass = 3; 

                        data.push({
                            originalRowIndex: i + 1,
                            kaoRank: rankMap[row[colIdx.kaolinite]] ?? 0,
                            illRank: rankMap[row[colIdx.illite]] ?? 0,
                            smeRank: rankMap[row[colIdx.smectite]] ?? 0,
                            verRank: rankMap[row[colIdx.vermiculite]] ?? 0,
                            cec: parseFloat(row[colIdx.cec]),
                            bs: parseFloat(row[colIdx.bs]),
                            om: parseFloat(row[colIdx.om]),
                            p: parseFloat(row[colIdx.p]),
                            k: parseFloat(row[colIdx.k]),
                            fertility: fClass 
                        });
                    }
                    trainModel(data, mode, strictP);
                } catch (err) { setErrorMsg(err.message); }
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setErrorMsg('');
                
                const fileExtension = file.name.split('.').pop().toLowerCase();
                
                if (fileExtension === 'csv') {
                    const reader = new FileReader();
                    reader.onload = (event) => processCSV(event.target.result, modelMode, useStrictP);
                    reader.readAsText(file);
                } else if (fileExtension === 'xlsx' || fileExtension === 'xls') {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        try {
                            const data = new Uint8Array(event.target.result);
                            const workbook = XLSX.read(data, { type: 'array' });
                            const firstSheetName = workbook.SheetNames[0];
                            const worksheet = workbook.Sheets[firstSheetName];
                            const csvData = XLSX.utils.sheet_to_csv(worksheet);
                            processCSV(csvData, modelMode, useStrictP);
                        } catch (err) {
                            setErrorMsg('เกิดข้อผิดพลาดในการอ่านไฟล์ Excel กรุณาตรวจสอบว่าไฟล์ไม่ได้รับความเสียหาย');
                        }
                    };
                    reader.readAsArrayBuffer(file);
                } else {
                    setErrorMsg('โปรแกรมรองรับเฉพาะไฟล์สกุล .csv และ .xlsx เท่านั้น');
                }
            };

            const trainModel = (data, mode = modelMode, strictP = useStrictP) => {
                setRawTrainingData(data); 
                
                const properties = mode === 'bottom_up' ? ['cec', 'bs', 'om', 'p', 'k'] : ['fertility'];
                const propKeys = { cec: 'CEC', bs: 'BS', om: 'OM', p: 'P', k: 'K', fertility: 'FERT' };
                
                const newWeights = {}, newStats = {}, newCutoffs = {}, newCharts = {}, newGroupedData = {};

                properties.forEach(prop => {
                    const actualVals = data.map(d => d[prop]).filter(val => !isNaN(val));
                    const n = actualVals.length;
                    
                    let rKao = calcCorrelation(data.map(d => d.kaoRank), actualVals);
                    let rIll = calcCorrelation(data.map(d => d.illRank), actualVals);
                    let rSme = calcCorrelation(data.map(d => d.smeRank), actualVals);
                    let rVer = calcCorrelation(data.map(d => d.verRank), actualVals);

                    const statKao = calculateStats(rKao, n);
                    const statIll = calculateStats(rIll, n);
                    const statSme = calculateStats(rSme, n);
                    const statVer = calculateStats(rVer, n);

                    // ปรับเงื่อนไขการนำไปใช้: ยอมรับ r ที่ติดลบ และดูว่าต้องสน strictP ไหม
                    newStats[prop] = {
                        Kao: { r: rKao, t: statKao.t, p: statKao.p, n: n, used: (!strictP || statKao.p <= 0.05) },
                        Ill: { r: rIll, t: statIll.t, p: statIll.p, n: n, used: (!strictP || statIll.p <= 0.05) },
                        Sme: { r: rSme, t: statSme.t, p: statSme.p, n: n, used: (!strictP || statSme.p <= 0.05) },
                        Ver: { r: rVer, t: statVer.t, p: statVer.p, n: n, used: (!strictP || statVer.p <= 0.05) },
                    };

                    newCharts[prop] = {
                        Kao: data.map(d => ({ x: d.kaoRank, y: d[prop] })).filter(d => !isNaN(d.y)),
                        Ill: data.map(d => ({ x: d.illRank, y: d[prop] })).filter(d => !isNaN(d.y)),
                        Sme: data.map(d => ({ x: d.smeRank, y: d[prop] })).filter(d => !isNaN(d.y)),
                        Ver: data.map(d => ({ x: d.verRank, y: d[prop] })).filter(d => !isNaN(d.y))
                    };

                    newWeights[prop] = {
                        Kao: newStats[prop].Kao.used ? rKao : 0, 
                        Ill: newStats[prop].Ill.used ? rIll : 0, 
                        Sme: newStats[prop].Sme.used ? rSme : 0, 
                        Ver: newStats[prop].Ver.used ? rVer : 0
                    };

                    const indices = data.map(d => {
                        const wKao = newWeights[prop].Kao;
                        const wIll = newWeights[prop].Ill;
                        const wSme = newWeights[prop].Sme;
                        const wVer = newWeights[prop].Ver;
                        const idx = (wKao * d.kaoRank) + (wIll * d.illRank) + (wSme * d.smeRank) + (wVer * d.verRank);
                        
                        const actualScore = prop === 'fertility' ? d[prop] : getLddScore(d[prop], propKeys[prop]);
                        const eqStr = `(${wKao.toFixed(3)}×${d.kaoRank}) + (${wIll.toFixed(3)}×${d.illRank}) + (${wSme.toFixed(3)}×${d.smeRank}) + (${wVer.toFixed(3)}×${d.verRank})`;
                        
                        return { index: idx, actualScore: actualScore, eqStr: eqStr, rowId: d.originalRowIndex };
                    });

                    const group1 = indices.filter(d => d.actualScore === 1);
                    const group2 = indices.filter(d => d.actualScore === 2);
                    const group3 = indices.filter(d => d.actualScore === 3);

                    newGroupedData[prop] = { 1: group1, 2: group2, 3: group3 };

                    const mean1 = group1.length ? group1.reduce((a,b)=>a+b.index,0)/group1.length : 0;
                    const mean2 = group2.length ? group2.reduce((a,b)=>a+b.index,0)/group2.length : (mean1 + 1);
                    const mean3 = group3.length ? group3.reduce((a,b)=>a+b.index,0)/group3.length : (mean2 + 1);

                    let cut1_2 = group1.length && group2.length ? (mean1 + mean2) / 2 : (group1.length ? mean1 + 0.5 : mean2 - 0.5);
                    let cut2_3 = group2.length && group3.length ? (mean2 + mean3) / 2 : (group2.length ? mean2 + 0.5 : mean3 - 0.5);

                    if (cut1_2 >= cut2_3) cut2_3 = cut1_2 + 0.5;

                    newCutoffs[prop] = { t1: cut1_2, t2: cut2_3, mean1, mean2, mean3, count1: group1.length, count2: group2.length, count3: group3.length };
                });

                setWeights(newWeights); setStats(newStats); setCutoffs(newCutoffs); setChartData(newCharts); setGroupedData(newGroupedData);
                setModelTrained(true); setErrorMsg('');
            };
            
            // ฟังก์ชันสำหรับสลับบังคับค่า P และให้ประมวลผลใหม่ทันที
            const toggleStrictPValue = () => {
                const newStrict = !useStrictP;
                setUseStrictP(newStrict);
                if (modelTrained) {
                    trainModel(rawTrainingData, modelMode, newStrict);
                }
            };
            
            // ฟังก์ชันสำหรับเปลี่ยนโหมด Model และประมวลผลใหม่ทันที
            const changeModelMode = (e) => {
                const newMode = e.target.value;
                setModelMode(newMode);
                if (modelTrained) {
                    trainModel(rawTrainingData, newMode, useStrictP);
                }
            };

            const handlePredict = () => {
                if (!modelTrained) return;
                const rKao = rankMap[inputXrd.Kaolinite], rIll = rankMap[inputXrd.Illite], rSme = rankMap[inputXrd.Smectite], rVer = rankMap[inputXrd.Vermiculite];
                const results = {};
                let totalScore = 0;
                
                const properties = modelMode === 'bottom_up' ? ['cec', 'bs', 'om', 'p', 'k'] : ['fertility'];

                properties.forEach(prop => {
                    const w = weights[prop], cuts = cutoffs[prop];
                    const idx = (w.Kao * rKao) + (w.Ill * rIll) + (w.Sme * rSme) + (w.Ver * rVer);
                    
                    let score = 1, criteriaStr = `ดัชนี ≤ ${cuts.t1.toFixed(3)} → 1 คะแนน`;
                    if (idx > cuts.t2) { score = 3; criteriaStr = `ดัชนี > ${cuts.t2.toFixed(3)} → 3 คะแนน`; } 
                    else if (idx > cuts.t1) { score = 2; criteriaStr = `ดัชนีอยู่ระหว่าง ${cuts.t1.toFixed(3)} ถึง ${cuts.t2.toFixed(3)} → 2 คะแนน`; }

                    results[prop] = { 
                        index: idx.toFixed(3), score,
                        equationStr: `(${w.Kao.toFixed(3)} × ${rKao}) + (${w.Ill.toFixed(3)} × ${rIll}) + (${w.Sme.toFixed(3)} × ${rSme}) + (${w.Ver.toFixed(3)} × ${rVer})`,
                        cutoffLimitsStr: `ต่ำ: ≤ ${cuts.t1.toFixed(3)} | ปานกลาง: ${cuts.t1.toFixed(3)} - ${cuts.t2.toFixed(3)} | สูง: > ${cuts.t2.toFixed(3)}`,
                        criteriaStr
                    };
                    totalScore += score;
                });

                let fertilityClass = "ต่ำ (Low)", colorClass = "text-red-600 bg-red-100 border-red-300";
                
                if (modelMode === 'bottom_up') {
                    if (totalScore >= 13) { fertilityClass = "สูง (High)"; colorClass = "text-green-600 bg-green-100 border-green-300"; }
                    else if (totalScore >= 8) { fertilityClass = "ปานกลาง (Medium)"; colorClass = "text-yellow-600 bg-yellow-100 border-yellow-300"; }
                } else {
                    const fScore = results['fertility'].score;
                    if (fScore === 3) { fertilityClass = "สูง (High)"; colorClass = "text-green-600 bg-green-100 border-green-300"; }
                    else if (fScore === 2) { fertilityClass = "ปานกลาง (Medium)"; colorClass = "text-yellow-600 bg-yellow-100 border-yellow-300"; }
                }
                
                setPrediction({ results, totalScore, fertilityClass, colorClass });
            };

            const propNames = { cec: 'CEC (cmol/kg)', bs: '% Base Saturation', om: 'Organic Matter (%)', p: 'Phosphorus (mg/kg)', k: 'Potassium (mg/kg)', fertility: 'ระดับความอุดมสมบูรณ์รวม (1-3)' };
            const loopProperties = modelMode === 'bottom_up' ? ['cec', 'bs', 'om', 'p', 'k'] : ['fertility'];

            const boxPlotConfigs = [
                { id: 'cec', title: 'CEC', unit: '(cmol/kg)', hex: '#bfdbfe', stroke: '#3b82f6' },
                { id: 'bs', title: '% Base Saturation', unit: '(%)', hex: '#bbf7d0', stroke: '#22c55e' },
                { id: 'om', title: 'Organic Matter', unit: '(%)', hex: '#fef08a', stroke: '#eab308' },
                { id: 'p', title: 'Phosphorus', unit: '(mg/kg)', hex: '#fecaca', stroke: '#ef4444' },
                { id: 'k', title: 'Potassium', unit: '(mg/kg)', hex: '#e9d5ff', stroke: '#a855f7' }
            ];

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center space-x-4">
                                <div className="p-3 bg-blue-100 rounded-lg text-blue-600 shrink-0">
                                    <Calculator size={32} />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-800">ระบบประเมินความอุดมสมบูรณ์ดินจากแร่ดินเหนียว</h1>
                                    <p className="text-gray-500">เวอร์ชันเปรียบเทียบวิธีวิจัย: {modelMode === 'bottom_up' ? 'หา 5 สมการแยกพารามิเตอร์' : 'หา 1 สมการรวม (Top-Down)'}</p>
                                </div>
                            </div>
                            {modelTrained && (
                                <button onClick={resetApp} className="px-4 py-2 rounded text-red-600 hover:bg-red-50 border border-red-200 font-bold flex items-center transition">
                                    <RefreshCw size={18} className="mr-2" /> สลับโมเดล / อัปโหลดไฟล์ใหม่
                                </button>
                            )}
                        </div>

                        {/* แผงควบคุมเมนูแสดงผล (Control Panel) */}
                        {modelTrained && (
                            <div className="flex flex-wrap gap-3 bg-white p-4 rounded-xl shadow-sm border border-gray-200 items-center">
                                <span className="font-bold text-gray-700 w-full md:w-auto flex items-center mr-2">เมนูเปิดดูกล่องดำ (Black Box):</span>
                                <button onClick={() => setShowRawData(!showRawData)} className={`px-4 py-2 rounded-lg font-bold flex items-center transition text-sm ${showRawData ? 'bg-teal-600 text-white shadow-md' : 'bg-teal-50 text-teal-700 hover:bg-teal-100 border border-teal-200'}`}>
                                    <ListIcon size={18} className="mr-2" /> {showRawData ? 'ซ่อนข้อมูลตั้งต้น' : '1. ข้อมูลที่ใช้เทรน'}
                                </button>
                                <button onClick={() => setShowGroupedData(!showGroupedData)} className={`px-4 py-2 rounded-lg font-bold flex items-center transition text-sm ${showGroupedData ? 'bg-orange-600 text-white shadow-md' : 'bg-orange-50 text-orange-700 hover:bg-orange-100 border border-orange-200'}`}>
                                    <LayersIcon size={18} className="mr-2" /> {showGroupedData ? 'ซ่อนกล่องดัชนี' : '2. ข้อมูลในกล่อง (จุดตัด)'}
                                </button>
                                <button onClick={() => setShowStats(!showStats)} className={`px-4 py-2 rounded-lg font-bold flex items-center transition text-sm ${showStats ? 'bg-indigo-600 text-white shadow-md' : 'bg-indigo-50 text-indigo-700 hover:bg-indigo-100 border border-indigo-200'}`}>
                                    <BarChart2 size={18} className="mr-2" /> {showStats ? 'ซ่อน Scatter Plot' : '3. Scatter Plot & T-value'}
                                </button>
                                <button onClick={() => setShowBoxPlots(!showBoxPlots)} className={`px-4 py-2 rounded-lg font-bold flex items-center transition text-sm ${showBoxPlots ? 'bg-rose-600 text-white shadow-md' : 'bg-rose-50 text-rose-700 hover:bg-rose-100 border border-rose-200'}`}>
                                    <BoxIcon size={18} className="mr-2" /> {showBoxPlots ? 'ซ่อน Box Plot' : '4. ดูการกระจายตัว (Box Plot)'}
                                </button>
                            </div>
                        )}

                        {errorMsg && (
                            <div className="bg-red-50 p-4 rounded-lg flex items-center space-x-2 text-red-600 border border-red-200">
                                <AlertCircle size={20} className="shrink-0" /> <p>{errorMsg}</p>
                            </div>
                        )}

                        {/* Step 1: Upload & Select Mode */}
                        {!modelTrained && (
                            <div className="bg-white p-8 rounded-xl shadow-sm border border-gray-100 text-center space-y-6">
                                <div>
                                    <Database size={48} className="mx-auto text-gray-400 mb-2" />
                                    <h2 className="text-xl font-semibold">ขั้นตอนที่ 1: เลือกวิธีวิจัยและนำเข้าข้อมูล</h2>
                                </div>
                                
                                <div className="max-w-3xl mx-auto flex flex-col md:flex-row gap-4 text-left">
                                    <label className={`flex-1 p-5 border-2 rounded-xl cursor-pointer transition ${modelMode === 'bottom_up' ? 'bg-blue-50 border-blue-500 shadow-md' : 'bg-white border-gray-200 hover:border-blue-300'}`}>
                                        <div className="flex items-center mb-2">
                                            <input type="radio" name="modelMode" value="bottom_up" checked={modelMode === 'bottom_up'} onChange={changeModelMode} className="w-5 h-5 text-blue-600 focus:ring-blue-500" />
                                            <span className="ml-2 font-bold text-lg text-blue-900">เวอร์ชัน 1: โมเดล 20 คู่ (Bottom-up)</span>
                                        </div>
                                        <p className="text-sm text-gray-600 pl-7">หาความสัมพันธ์รายพารามิเตอร์ 5 ตัว (ได้ 20 กราฟ) สร้าง 5 สมการย่อย แล้วนำคะแนนที่ได้ (1-3) มารวมกัน <strong>เป็นวิธีที่สอดคล้องกับทฤษฎีปฐพีวิทยาที่สุด (แนะนำ)</strong></p>
                                    </label>

                                    <label className={`flex-1 p-5 border-2 rounded-xl cursor-pointer transition ${modelMode === 'top_down' ? 'bg-red-50 border-red-500 shadow-md' : 'bg-white border-gray-200 hover:border-red-300'}`}>
                                        <div className="flex items-center mb-2">
                                            <input type="radio" name="modelMode" value="top_down" checked={modelMode === 'top_down'} onChange={changeModelMode} className="w-5 h-5 text-red-600 focus:ring-red-500" />

                                {/* แกลลอรี่กราฟ 20 คู่ */}
                                <div>
                                    <h3 className="font-bold text-gray-800 mb-3 border-b pb-2">ภาพที่ 1: แผนภาพกระจาย (Scatter Plots) เพื่อนำไปใช้เป็นภาพประกอบในเล่ม</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-6">
                                        {loopProperties.map(prop => (
                                            ['Kao', 'Ill', 'Sme', 'Ver'].map(min => {
                                                const mineralName = min === 'Kao' ? 'Kaolinite' : min === 'Ill' ? 'Illite' : min === 'Sme' ? 'Smectite' : 'Vermiculite';
                                                const title = `ความสัมพันธ์ระหว่าง ${mineralName} และ ${prop === 'fertility' ? 'คะแนนรวม' : prop.toUpperCase()}`;
                                                const stat = stats[prop][min];
                                                return <ScatterPlot 
                                                    key={`plot-${prop}-${min}`} 
                                                    title={title} 
                                                    yLabel={propNames[prop]} 
                                                    data={chartData[prop][min]} 
                                                    stat={stat} 
                                                    isFertilityScore={prop === 'fertility'}
                                                />
                                            })
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ===================== ส่วนที่ 4: การกระจายตัว (Box Plot) ===================== */}
                        {modelTrained && showBoxPlots && (
                            <div className="bg-rose-50/30 p-6 rounded-xl border-2 border-rose-200 shadow-inner space-y-6 animate-fade-in mt-6">
                                <div className="text-center">
                                    <h2 className="text-2xl font-black text-rose-800 flex items-center justify-center">
                                        <BoxIcon size={28} className="mr-2" /> การกระจายตัวของข้อมูลวิเคราะห์เคมี (Box Plot Analysis)
                                    </h2>
                                    <p className="text-rose-700 mt-2 max-w-3xl mx-auto">
                                        แผนภาพกล่อง (Box Plot) แสดงการกระจายตัวของข้อมูลดิบจากห้องปฏิบัติการเพื่อตรวจสอบ <strong>ค่าผิดปกติ (Outliers)</strong> 
                                        ที่อาจส่งผลต่อการฝึกสอนโมเดล จุดสีแดงแสดงถึงข้อมูลที่หลุดกรอบ $\pm$ 1.5 IQR (Interquartile Range)
                                    </p>
                                </div>
                                
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {boxPlotConfigs.map(config => {
                                        const paramData = rawTrainingData
                                            .map((d) => ({ id: d.originalRowIndex, value: d[config.id] }))
                                            .filter(v => !isNaN(v.value) && v.value !== null);

                                        return (
                                            <StatBoxPlot 
                                                key={`boxplot-${config.id}`} 
                                                title={config.title} 
                                                unit={config.unit}
                                                hex={config.hex}
                                                stroke={config.stroke}
                                                data={paramData} 
                                            />
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {/* ===================== ส่วนพยากรณ์และจุดตัด ===================== */}
                        {modelTrained && (
                            <div className="grid md:grid-cols-12 gap-6 mt-8">
                                <div className="md:col-span-4 bg-white p-6 rounded-xl shadow-sm border border-gray-100 space-y-6 h-fit">
                                    <h3 className="text-lg font-bold text-gray-800 mb-2">หน้าต่างประเมินดินใหม่</h3>
                                    <div className="space-y-4">
                                        {['Kaolinite', 'Illite', 'Smectite', 'Vermiculite'].map(mineral => (
                                            <div key={mineral} className="flex flex-col space-y-1">
                                                <label className="font-medium text-gray-700 text-sm">{mineral}</label>
                                                <select className="p-2 border border-gray-300 rounded-lg w-full bg-white focus:ring-2 focus:ring-blue-500"
                                                    value={inputXrd[mineral]} onChange={(e) => setInputXrd({...inputXrd, [mineral]: e.target.value})}>
                                                    {availableRanges.map(range => <option key={range} value={range}>{range}% (อันดับ: {rankMap[range]})</option>)}
                                                </select>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={handlePredict} className="w-full mt-6 py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition shadow-md flex justify-center items-center">
                                        <Calculator size={18} className="mr-2" /> คำนวณผลและแสดงสมการ
                                    </button>
                                </div>

                                <div className="md:col-span-8 bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4 border-b pb-2">ผลการประเมินและการสาธิตสมการ</h3>
                                    {!prediction ? (
                                        <div className="h-64 flex flex-col items-center justify-center text-gray-400 border-2 border-dashed rounded-lg bg-gray-50">
                                            <Sigma size={48} className="mb-4 text-gray-300" />
                                            <p>ป้อนข้อมูลด้านซ้ายแล้วกดคำนวณ</p>
                                        </div>
                                    ) : (
                                        <div className="space-y-6">
                                            <div className={`p-6 rounded-xl text-center border-2 ${prediction.colorClass} relative overflow-hidden`}>
                                                <p className="text-sm font-bold uppercase tracking-widest opacity-80 mb-1">ภาพรวมความอุดมสมบูรณ์</p>
                                                <p className="text-4xl font-extrabold">{prediction.fertilityClass}</p>
                                                
                                                {modelMode === 'bottom_up' ? (
                                                    <div>
                                                        <p className="text-lg mt-2 font-medium bg-white/50 inline-block px-4 py-1 rounded-full border border-white/40 mb-2">คะแนนรวมจาก 5 สมการ: {prediction.totalScore} / 15</p>
                                                        <p className="text-xs font-semibold opacity-90 mt-1 block">(เกณฑ์: ≤ 7 ต่ำ, 8-12 ปานกลาง, ≥ 13 สูง)</p>
                                                    </div>
                                                ) : (
                                                    <div>
                                                        <p className="text-lg mt-2 font-medium bg-white/50 inline-block px-4 py-1 rounded-full border border-white/40 mb-2">พยากรณ์จากสมการตรง (Top-Down)</p>
                                                    </div>
                                                )}
                                            </div>
                                            
                                            <div className="space-y-4">
                                                <div className="grid gap-4">
                                                    {Object.entries(prediction.results).map(([prop, data]) => (
                                                        <div key={prop} className="border border-gray-200 rounded-lg overflow-hidden shadow-sm">
                                                            <div className="bg-gray-100 px-4 py-2 flex justify-between items-center border-b border-gray-200">
                                                                <span className="font-bold text-gray-700 uppercase tracking-wide">
                                                                    {prop === 'fertility' ? 'พารามิเตอร์: คะแนนความอุดมสมบูรณ์รวม' : `พารามิเตอร์: ${prop === 'bs' ? '%BS' : prop}`}
                                                                </span>
                                                                <span className="font-bold text-white bg-blue-600 px-3 py-1 rounded-full text-sm shadow-inner">ได้ {data.score} คะแนน</span>
                                                            </div>
                                                            <div className="p-4 bg-white font-mono text-sm space-y-3">
                                                                <div>
                                                                    <p className="text-gray-600 break-words"><span className="font-bold text-blue-700">Index</span> = {data.equationStr}</p>
                                                                    <p className="text-gray-800 font-bold mt-1">Index = {data.index}</p>
                                                                </div>
                                                                <div className="border-t border-dashed border-gray-200 pt-3">
                                                                    <p className="text-gray-500 text-xs mb-1">ช่วงคะแนนที่ตั้งไว้: {data.cutoffLimitsStr}</p>
                                                                    <p className="text-green-700 font-semibold flex items-center bg-green-50 w-fit px-2 py-1 rounded"><CheckCircle2 size={14} className="mr-1" />{data.criteriaStr}</p>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            {/* เพิ่มส่วนสรุปสมการตรงนี้ */}
                                            <div className="mt-6 bg-blue-50 border border-blue-200 rounded-xl p-5 shadow-inner">
                                                <h4 className="font-bold text-blue-900 mb-3 flex items-center">
                                                    <BookOpen size={20} className="mr-2" /> สรุปสมการสำหรับนำไปคำนวณด้วยมือ (Manual Calculation)
                                                </h4>
                                                <div className="space-y-4 text-sm font-mono text-gray-800">
                                                    {loopProperties.map(prop => {
                                                        const w = weights[prop];
                                                        const c = cutoffs[prop];
                                                        const propName = prop === 'fertility' ? 'FERTILITY' : prop.toUpperCase();
                                                        return (
                                                            <div key={`eq-${prop}`} className="bg-white p-3 rounded border border-blue-100">
                                                                <p className="font-bold text-blue-700 mb-1">สมการ {propName}:</p>
                                                                <p className="break-all whitespace-normal">
                                                                    Index_{propName} = ({w.Kao.toFixed(3)} × Kao) + ({w.Ill.toFixed(3)} × Ill) + ({w.Sme.toFixed(3)} × Sme) + ({w.Ver.toFixed(3)} × Ver)
                                                                </p>
                                                                <p className="text-gray-500 mt-1 text-xs">
                                                                    เกณฑ์คะแนน: ≤ {c.t1.toFixed(3)} (ได้ 1) | ระหว่าง {c.t1.toFixed(3)} ถึง {c.t2.toFixed(3)} (ได้ 2) | &gt; {c.t2.toFixed(3)} (ได้ 3)
                                                                </p>
                                                            </div>
                                                        )
                                                    })}
                                                    
                                                    {modelMode === 'bottom_up' && (
                                                        <div className="bg-white p-3 rounded border border-blue-100">
                                                            <p className="font-bold text-blue-700 mb-1">การแปลผลรวม (Total Score):</p>
                                                            <p>Total = Score_CEC + Score_BS + Score_OM + Score_P + Score_K</p>
                                                            <p className="text-gray-500 mt-1 text-xs">เกณฑ์ประเมิน: ≤ 7 (ต่ำ) | 8 - 12 (ปานกลาง) | ≥ 13 (สูง)</p>
                                                        </div>
                                                    )}
                                                    <div className="text-xs text-blue-600 mt-2 bg-blue-100/50 p-2 rounded">
                                                        * หมายเหตุ: ค่า Kao, Ill, Sme, Ver คืออันดับแร่ (Rank) 0 ถึง 6 ตามตารางเปอร์เซ็นต์แร่
                                                    </div>
                                                </div>
                                            </div>

                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ===================== ส่วนตารางอ้างอิงและที่มาจุดตัด ===================== */}
                        {modelTrained && (
                            <div className="space-y-6 mt-6">
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                                    <h3 className="text-xl font-bold text-green-800 mb-2 border-b-2 border-green-200 pb-2 flex items-center">
                                        <BookOpen size={24} className="text-green-600 mr-2" />
                                        ตารางอ้างอิง: ตารางที่ 15 การประเมินระดับความอุดมสมบูรณ์ของดิน (บรรเจิด, 2523 กรมพัฒนาที่ดิน)
                                    </h3>
                                    <table className="w-full text-center border-collapse text-sm min-w-[600px] mb-4">
                                        <thead>
                                            <tr className="bg-gray-100 text-gray-700 border-y-2 border-gray-300">
                                                <th className="p-3 border-x">ระดับความอุดมสมบูรณ์</th>
                                                <th className="p-3 border-x text-gray-500 text-xs font-normal">ระดับคะแนน</th>
                                                <th className="p-3 border-x">OM (%)</th>
                                                <th className="p-3 border-x">P (mg kg⁻¹)</th>
                                                <th className="p-3 border-x">K (mg kg⁻¹)</th>
                                                <th className="p-3 border-x">CEC (cmol kg⁻¹)</th>
                                                <th className="p-3 border-x">BS (%)</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            <tr className="border-b hover:bg-gray-50">
                                                <td className="p-3 border-x text-left font-semibold">ต่ำ</td>
                                                <td className="p-3 border-x text-gray-500">(1)</td>
                                                <td className="p-3 border-x">&lt; 1.5</td>
                                                <td className="p-3 border-x">&lt; 10</td>
                                                <td className="p-3 border-x">&lt; 60</td>
                                                <td className="p-3 border-x">&lt; 10</td>
                                                <td className="p-3 border-x">&lt; 35</td>
                                            </tr>
                                            <tr className="border-b hover:bg-gray-50">
                                                <td className="p-3 border-x text-left font-semibold">ปานกลาง</td>
                                                <td className="p-3 border-x text-gray-500">(2)</td>
                                                <td className="p-3 border-x">1.5 - 3.5</td>
                                                <td className="p-3 border-x">10 - 25</td>
                                                <td className="p-3 border-x">60 - 90</td>
                                                <td className="p-3 border-x">10 - 20</td>
                                                <td className="p-3 border-x">35 - 75</td>
                                            </tr>
                                            <tr className="border-b hover:bg-gray-50 border-b-2 border-gray-300">
                                                <td className="p-3 border-x text-left font-semibold">สูง</td>
                                                <td className="p-3 border-x text-gray-500">(3)</td>
                                                <td className="p-3 border-x">&gt; 3.5</td>
                                                <td className="p-3 border-x">&gt; 25</td>
                                                <td className="p-3 border-x">&gt; 90</td>
                                                <td className="p-3 border-x">&gt; 20</td>
                                                <td className="p-3 border-x">&gt; 75</td>
                                            </tr>
                                        </tbody>
                                    </table>
                                    
                                    <div className="bg-gray-50 p-4 rounded-lg text-sm flex flex-col md:flex-row justify-center items-center space-y-2 md:space-y-0 md:space-x-4 border border-gray-200">
                                        <span className="font-bold text-gray-700">เกณฑ์ประเมินระดับคะแนนรวมทั้งหมด:</span>
                                        <span className="bg-white border border-red-200 text-red-700 px-3 py-1 rounded-full shadow-sm">ผลรวม ≤ 7 = ต่ำ</span>
                                        <span className="bg-white border border-yellow-200 text-yellow-700 px-3 py-1 rounded-full shadow-sm">ผลรวม 8-12 = ปานกลาง</span>
                                        <span className="bg-white border border-green-200 text-green-700 px-3 py-1 rounded-full shadow-sm">ผลรวม ≥ 13 = สูง</span>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 overflow-x-auto">
                                    <h3 className="text-xl font-bold text-purple-800 mb-2 border-b-2 border-purple-200 pb-2 flex items-center">
                                        <Target size={24} className="text-purple-600 mr-2" />
                                        ตารางแสดงวิธีการคำนวณจุดตัดเกณฑ์ (Cut-offs Derivation)
                                    </h3>
                                    <table className="w-full text-center border-collapse text-sm min-w-[800px]">
                                        <thead>
                                            <tr className="bg-gray-100 border-y border-gray-300">
                                                <th className="p-3 border-x text-left">พารามิเตอร์เคมี / เป้าหมาย</th>
                                                <th className="p-3 border-x text-gray-600">ค่าเฉลี่ยดัชนี <strong>กลุ่มต่ำ (1)</strong></th>
                                                <th className="p-3 border-x text-gray-600">ค่าเฉลี่ยดัชนี <strong>กลุ่มกลาง (2)</strong></th>
                                                <th className="p-3 border-x text-gray-600">ค่าเฉลี่ยดัชนี <strong>กลุ่มสูง (3)</strong></th>
                                                <th className="p-3 border-x bg-yellow-50 text-yellow-800 font-bold">🎯 จุดตัด 1 → 2 <br/><span className="font-normal text-xs">(Cut-off ต่ำ-กลาง)</span></th>
                                                <th className="p-3 border-x bg-green-50 text-green-800 font-bold">🎯 จุดตัด 2 → 3 <br/><span className="font-normal text-xs">(Cut-off กลาง-สูง)</span></th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {loopProperties.map(prop => {
                                                const cut = cutoffs[prop];
                                                if (!cut) return null;
                                                return (
                                                    <tr key={`cut-${prop}`} className="border-b hover:bg-gray-50">
                                                        <td className="p-3 border-x font-bold uppercase text-left bg-white">{prop === 'bs' ? '%BS' : prop === 'fertility' ? 'คะแนนรวม' : prop}</td>
                                                        <td className="p-3 border-x"><span className="font-semibold text-base">{cut.count1 > 0 ? cut.mean1.toFixed(3) : '-'}</span><br/><span className="text-xs text-gray-400">(n={cut.count1})</span></td>
                                                        <td className="p-3 border-x"><span className="font-semibold text-base">{cut.count2 > 0 ? cut.mean2.toFixed(3) : '-'}</span><br/><span className="text-xs text-gray-400">(n={cut.count2})</span></td>
                                                        <td className="p-3 border-x"><span className="font-semibold text-base">{cut.count3 > 0 ? cut.mean3.toFixed(3) : '-'}</span><br/><span className="text-xs text-gray-400">(n={cut.count3})</span></td>
                                                        <td className="p-3 border-x bg-yellow-50/50 font-mono text-lg font-bold text-yellow-700">{cut.t1.toFixed(3)}</td>
                                                        <td className="p-3 border-x bg-green-50/50 font-mono text-lg font-bold text-green-700">{cut.t2.toFixed(3)}</td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
